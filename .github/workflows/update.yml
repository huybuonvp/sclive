name: Auto Scrape Live Streams

on:
  schedule:
    - cron: '*/30 * * * *' # Tự động chạy mỗi 20 phút một lần
  workflow_dispatch: # Cho phép kích hoạt chạy bằng tay từ nút "Run workflow"

jobs:
  update-streams:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cho phép ghi dữ liệu lên Repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Lấy toàn bộ lịch sử để tránh lỗi non-fast-forward

      - name: Set up Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Critical Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install curl_cffi requests

      - name: Run Scraper Engine (JSON + M3U)
        run: python scraper.py -f m3u8 -o streams.json

      - name: Commit Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add streams.json streams.m3u8
          git diff --quiet && git diff --staged --quiet || git commit -m "System: Auto-update streams and IPTV playlist [skip ci]"

      - name: Push Changes (Force)
        run: |
          git push origin main --force
